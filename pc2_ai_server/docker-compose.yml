services:
  ai-server:
    build: .
    container_name: pc2-ai-server
    restart: always
    # Προσθήκη DNS για να βγαίνει το container στο internet
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # ΑΝΟΙΓΜΑ ΘΥΡΑΣ: Επιτρέπει στο Laptop να στείλει τα βίντεο
    ports:
      - "5006:5006"
    volumes:
      - ./ai_videos:/app/ai_videos
      - ./models:/app/models
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: pc2-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: drone_ai_db
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pc2-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password